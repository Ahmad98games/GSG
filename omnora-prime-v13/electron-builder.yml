appId: com.omnoralabs.noxis
productName: Noxis Hub
copyright: Copyright 2026 Omnora Labs

directories:
  buildResources: build
  output: dist

# Files to include in the app
files:
  - "**/*"
  - "!src"
  - "!.next"
  - "!dist"
  - "!*.ts"
  - "!*.map"
  - "!.git"
  - "!scratch"
  - "!.agents"
  - "!.claude"
  - "!.windsurf"
  - "!.github"
  - "!.venv"
  - "!android"
  - "!supabase"
  - "!scripts"
  - "!*.html"
  - "!audit*"
  - "!lint_results*"
  - dist-electron/**/*
  - package.json

# Extra resources copied to resources/
# These are accessible via process.resourcesPath
extraResources:
  # The Next.js standalone server
  - from: ".next/standalone"
    to: "standalone"
    filter:
      - "**/*"

  # Standalone node_modules (copied explicitly since electron-builder ignores nested node_modules)
  - from: ".next/standalone/node_modules"
    to: "standalone/node_modules"
    filter:
      - "**/*"

  # Mobile WebSocket bridge wrapper server
  # Spawned by electron/main.ts instead of bare server.js.
  # Boots Next.js + attaches /mobile-bridge WebSocket endpoint.
  - from: "server-with-bridge.js"
    to: "standalone/server-with-bridge.js"

  # Static files the server needs
  - from: ".next/static"
    to: "standalone/.next/static"
    filter:
      - "**/*"

  # Public folder
  - from: "public"
    to: "standalone/public"
    filter:
      - "**/*"

  # Native SQLite binding — CRITICAL
  # Without this the server crashes instantly
  - from: "node_modules/better-sqlite3-multiple-ciphers"
    to: "better-sqlite3-multiple-ciphers"
    filter:
      - "**/*"

  # Build assets (icon etc)
  - from: "build"
    to: "build"
    filter:
      - "**/*"

  # Environment file
  - from: ".env.local"
    to: ".env"

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  # Edit executable resources (icon and metadata) in the final Windows binary
  signAndEditExecutable: true

asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/better-sqlite3-multiple-ciphers/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/better-sqlite3-multiple-ciphers/**"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Noxis Hub
  menuCategory: Business
  artifactName: "NoxisHub-Setup-${version}.${ext}"
  deleteAppDataOnUninstall: false
  license: build/license.txt
  warningsAsErrors: false
  differentialPackage: false
  displayLanguageSelector: false
  multiLanguageInstaller: false
  runAfterFinish: true
  include: build/installer.nsh
  # Stock NSIS (~2GiB+) produces a tiny useless Setup.exe; NSISBI embeds huge app payloads.
  # Ref: https://github.com/electron-userland/electron-builder/issues/8399
  customNsisBinary:
    url: https://github.com/SoundSafari/NSISBI-ElectronBuilder/releases/download/1.0.0/nsisbi-electronbuilder-3.10.3.7z
    checksum: WRmZUsACjIc2s7bvsFGFRofK31hfS7riPlcfI1V9uFB2Q8s7tidgI/9U16+X0I9X2ZhNxi8N7Z3gKvm6ojvLvg==

mac:
  icon: build/icon.icns
  category: public.app-category.business

linux:
  icon: build/icon.png
  category: Office

publish:
  provider: github
  owner: omnoralabs
  repo: noxis-releases
  private: false

# Rebuild native modules for the correct
# Electron Node.js ABI version
# This is what fixes the .node binding crash
npmRebuild: false
electronVersion: "41.4.0"
