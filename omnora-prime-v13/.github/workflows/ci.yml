name: Noxis Hub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────
  # JOB 1 — Code Quality
  # ─────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────────
  # JOB 2 — Tests with Coverage
  # ─────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Coverage summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json | \
            node -e "
              const c = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))
              const t = c.total
              console.log('| Metric | Coverage |')
              console.log('|--------|---------|')
              console.log('| Lines | ' + t.lines.pct + '% |')
              console.log('| Functions | ' + t.functions.pct + '% |')
              console.log('| Branches | ' + t.branches.pct + '% |')
            " >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────
  # JOB 3 — Next.js Build
  # ─────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: https://noxishub.app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Check bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          cat .next/build-manifest.json | \
            node -e "
              const m = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))
              console.log('Build completed successfully')
            " >> $GITHUB_STEP_SUMMARY || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ─────────────────────────────────
  # JOB 4 — Security Scan
  # ─────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          # Scan for accidentally committed secrets
          grep -r "SUPABASE_SERVICE_ROLE_KEY\s*=" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            src/ && \
            echo "ERROR: Service role key found in source!" && \
            exit 1 || echo "✓ No hardcoded secrets found"

      - name: Check .env files not committed
        run: |
          if git ls-files | grep -E "\.env$|\.env\.local$"; then
            echo "ERROR: .env file is tracked by git!"
            exit 1
          else
            echo "✓ No .env files in git"
          fi

  # ─────────────────────────────────
  # JOB 5 — Electron Build (on main only)
  # Expensive — only runs on main branch
  # ─────────────────────────────────
  electron:
    name: Electron Build
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_TOKEN_SECRET: ${{ secrets.ADMIN_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: noxis-hub-setup
          path: dist/*.exe
          retention-days: 30

      - name: Get .exe size
        run: |
          $size = (Get-Item dist\*.exe).Length / 1MB
          echo "## Electron Build" >> $env:GITHUB_STEP_SUMMARY
          echo "EXE Size: $([math]::Round($size, 1)) MB" >> $env:GITHUB_STEP_SUMMARY
