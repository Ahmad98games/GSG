name = "noxishub"
compatibility_date = "2024-04-01"

[assets]
directory = "./omnora-prime-v13/out"
not_found_handling = "single-page-application"

[build]
command = "cd omnora-prime-v13 && npm ci --legacy-peer-deps && CLOUDFLARE_DEPLOY=true NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy SUPABASE_SERVICE_ROLE_KEY=dummy npm run build"
